<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Billista</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
  <h1>Billista</h1>
  <p class="subtitle" id="datum-visning"></p>

  <div class="btn-row">
    <button id="btn-rapportera" class="btn-secondary">Rapportera ett problem</button>
  </div>

  <h2>Dagens lista</h2>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Regnr</th>
          <th>Förare</th>
          <th>Tid</th>
          <th>Skift</th>
        </tr>
      </thead>
      <tbody id="dagens-lista-body">
        <tr><td colspan="4" class="muted">Laddar...</td></tr>
      </tbody>
    </table>
  </div>

  <h2>Exportera</h2>
  <div class="btn-row">
    <button id="export-dag" class="btn-secondary">Dag</button>
    <button id="export-vecka" class="btn-secondary">Vecka</button>
    <button id="export-manad" class="btn-secondary">Månad</button>
  </div>
</div>

<div id="modal-root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="config.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/export.js"></script>
<script src="js/tickets.js"></script>
<script src="js/personal.js"></script>
</body>
</html>
